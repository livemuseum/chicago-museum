<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicago Museum Pro+</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

#panel {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:12px;
  width:280px;
  z-index:999;
  border-radius:8px;
}

input, button { width:100%; margin-top:6px; }
</style>
</head>

<body>

<div id="panel">
  <b>Chicago Museum PRO+</b>

  <button onclick="loadChicago()">Load Chicago Data</button>
  <button onclick="loadHistoric()">Load Historic Photos</button>

  <input id="search" placeholder="Search buildings...">

  <label>Timeline</label>
  <input type="range" id="year" min="1800" max="1950" value="1900">
  <div id="yearLabel">1900</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script src="map.js"></script>

</body>
</html>
