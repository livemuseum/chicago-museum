<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Museum Pro</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial;
    }

    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;

      width: 280px;
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.25);
    }

    #searchBox {
      width: 100%;
      padding: 6px;
      margin-bottom: 10px;
    }

    #yearRange {
      width: 100%;
    }

    #yearLabel {
      font-weight: bold;
      margin: 5px 0;
    }

    #details {
      margin-top: 10px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    #sidebar {
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      border-top: 1px solid #ddd;
    }

    .object-card {
      padding: 6px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .object-card:hover {
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <h2>Museum Pro</h2>

  <input id="searchBox" placeholder="Search..." />

  <label>Timeline</label>
  <input id="yearRange" type="range" min="1800" max="2025" value="2025"/>

  <div id="yearLabel">2025</div>

  <div id="sidebar"></div>

  <div id="details">
    <h3>Chicago Museum</h3>
    <p>Click a marker</p>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="map.js?v=999"></script>

</body>
</html>
