<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicago Museum Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<style>
body { margin:0; font-family: Arial; }
#map { height: 100vh; }

#panel {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 999;
  background: white;
  padding: 10px;
  border-radius: 8px;
  width: 260px;
}

button { margin: 2px; }
input { width: 100%; margin-top: 5px; }
</style>
</head>

<body>

<div id="panel">
  <b>Chicago Museum</b><br>

  <input id="search" placeholder="Search..."/>

  <div>
    <button onclick="filterType('all')">All</button>
    <button onclick="filterType('church')">Churches</button>
    <button onclick="filterType('house')">Houses</button>
    <button onclick="filterType('architecture')">Architecture</button>
  </div>

  <div>
    <input type="range" min="1800" max="1950" value="1900" id="yearRange">
    <div id="yearLabel">Year: 1900</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map.js"></script>

</body>
</html>
