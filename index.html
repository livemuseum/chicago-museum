<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Museum Pro Smart GIS</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      width: 280px;
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.25);
    }

    #details {
      margin-top: 10px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    .legend {
      margin-top: 10px;
      font-size: 13px;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .church { background: #b30000; }
    .skyscraper { background: #1f77b4; }
    .district { background: #2ca02c; }
    .historic { background: #ff7f0e; }
  </style>
</head>

<body>

<div id="map"></div>

<div id="ui">

  <h3>Museum Pro</h3>

  <div class="legend">
    <div><span class="dot church"></span>Church</div>
    <div><span class="dot skyscraper"></span>Skyscraper</div>
    <div><span class="dot district"></span>District</div>
    <div><span class="dot historic"></span>Historic</div>
  </div>

  <div id="details">
    <b>Click a marker</b>
    <p>Wikipedia info will appear here</p>
  </div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Cluster -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- App -->
<script src="map.js?v=3"></script>

</body>
</html>
