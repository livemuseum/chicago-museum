<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicago GIS Museum v4</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family: Arial; }
#map { height:100vh; }

#panel {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  width:280px;
  z-index:999;
  border-radius:8px;
}

input, button {
  width:100%;
  margin-top:6px;
}
</style>
</head>

<body>

<div id="panel">
  <b>Chicago GIS Museum v4</b>

  <button onclick="loadBuildings()">🏛 Buildings</button>
  <button onclick="loadSchools()">🏫 Schools</button>
  <button onclick="loadCrime()">🚨 Crime (sample)</button>

  <input id="search" placeholder="Search...">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="map.js"></script>

</body>
</html>
