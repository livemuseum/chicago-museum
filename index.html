<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Museum Pro 3D</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>

  <link
    href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet"
  />

  <style>

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial;
    }

    #cesiumContainer {
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;

      width: 320px;

      background: rgba(255,255,255,0.95);

      padding: 15px;

      border-radius: 10px;

      z-index: 9999;

      box-shadow: 0 2px 15px rgba(0,0,0,0.3);
    }

    #details {
      margin-top: 10px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div id="cesiumContainer"></div>

<div id="ui">

  <h2>Museum Pro 3D AI</h2>

  <div id="details">
    Click an object
  </div>

</div>

<script src="map.js?v=999"></script>

</body>
</html>
