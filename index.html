<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Museum Pro</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Marker Cluster -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"
  />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;

      width: 280px;

      background: white;
      padding: 15px;
      border-radius: 10px;

      box-shadow: 0 2px 15px rgba(0,0,0,0.25);
    }

    #ui h2 {
      margin-top: 0;
      margin-bottom: 15px;
    }

    #searchBox {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }

    #yearRange {
      width: 100%;
    }

    #yearLabel {
      margin-top: 5px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    #sidebar {
      margin-top: 15px;
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    .object-card {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .object-card:hover {
      background: #f5f5f5;
    }
  </style>
</head>

<body>

<div id="ui">

  <h2>Museum Pro</h2>

  <input
    id="searchBox"
    type="text"
    placeholder="Search objects..."
  />
<div id="ui">

  <div id="details">
    <h2>Chicago Museum</h2>
    <p>Click a location on the map</p>
  </div>

</div>

<div id="map"></div>
  <label>Timeline</label>

  <input
    id="yearRange"
    type="range"
    min="1800"
    max="2025"
    value="2025"
  />

  <div id="yearLabel">2025</div>

  <div id="sidebar"></div>

</div>

<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MarkerCluster -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- App -->
<script src="map.js"></script>

</body>
</html>
